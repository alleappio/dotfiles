[general]
import = [
    "theme.toml"
]

[cursor]
style = { shape="Beam", blinking="On"}

[env]
TERM = "xterm-256color"

[font]
normal = { family="AdwaitaMono Nerd Font" }
bold = { family="AdwaitaMono Nerd Font" }
italic = { family="AdwaitaMono Nerd Font" }
size = 11

[keyboard]
bindings = [
    {key="Back", mods="Control", chars="\u001b\u007f"},

    { key = "E", mods = "Control|Shift", chars = "\u0002%" },
    { key = "O", mods = "Control|Shift", chars = "\u0002\"" },

    # Pane navigation
    { key = "Left",  mods = "Alt", chars = "\u0002\u001b[D" },
    { key = "Right", mods = "Alt", chars = "\u0002\u001b[C" },
    { key = "Up",    mods = "Alt", chars = "\u0002\u001b[A" },
    { key = "Down",  mods = "Alt", chars = "\u0002\u001b[B" }
]
